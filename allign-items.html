<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap
        {
            display: flex;
            margin: 0%;
            align-items: flex-start;
            /*align-items:flex-end;*/
            flex-direction: column;
            background-color: rgb(198, 174, 221);
        }
        .wrap>div
        {
            padding:0.2em;
            font-size: 2vw;
        }
        .o 
        {
            color: aliceblue;
            background-color: aquamarine;
        }
        .r
        {
            color: aliceblue;
            background-color: rgb(80, 204, 163);
        }
        .b
        {
            color: aliceblue;
            background-color: rgb(25, 145, 105);
        }
    </style>
</head>
<body>
   <div class="wrap">
    <div class="o">1</div>
    <div class="r">2</div>
    <div class="b">3</div>
   </div>
</body>
</html>
