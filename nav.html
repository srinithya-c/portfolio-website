<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"content="width=device-width,initial-scale=1.0">
        <title>Navigation Bar</title>
    <style>
        h1
        {
           text-align: center;
           margin: 20px;
        }
        ul
        {
          list-style-type: none;
          margin: 0;
          padding: 0;
          background-color: blueviolet;
          border-radius: 10px;
        }
        li
        {
            float:left;
        }
        li a
        {
            display: block;
            padding: 14px 30px;
            text-decoration: none;
            background-color: black;
            color: aliceblue;
            transition: background-color 0.3s, color 0.3s;
        }
        li a:hover
        {
            background-color: burlywood;
           color:goldenrod; 
        }
        .active 
        {
            background-color:gray;
            color: rgb(119, 148, 76);
        }
        li a.active {
            display: block;
            background-color: beige;
            color: black;
            font-weight: bold;
        }

    </style>
    </head>
<body>
     <h1>Navigation Bar</h1>
    <ul>
        <li><a class="active" href="default.asp">Home</a></li>
        <li><a href="default.asp">About</a></li>
        <li><a href="default.asp">Contact</a></li>
        <li><a href="default.asp">Register</a></li>
</ul>
</body>
</html>
