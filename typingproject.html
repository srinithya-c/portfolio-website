<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typing Speed Test</title>
  <style>
    body
    {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #7a6570;
      text-align: center;
      margin-top: 0px;
    }
    textarea 
    {
      width: 90%;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }
    button 
     {
      margin: 5px 5px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result,
    #liveCount,
    #timer 
    {
      margin-top: 5px;
      font-size: 18px;
      font-weight: bold;
    }
    h1
    {
      margin-top: 0px;
    }
  </style>
</head>
<body>
  <h1>Typing Speed Test</h1>
  <p>Type to increase your speed.It will be measured in words per minute(WPM).</p>

  <textarea id="input" placeholder="Start typing here..."></textarea><br />

  <button onclick="startTest()">Start</button>
  <button onclick="stopTest()">Stop</button>
  <span id="timer">Time: 60s</span>

  <div id="liveCount">Words: 0</div>
  <div id="result"></div>

  <script>
    let countdown;
    let ended = false;
    let timeLeft = 60;

    const input = document.getElementById("input");
    const timerDisplay = document.getElementById("timer");
    const result = document.getElementById("result");
    const liveCount = document.getElementById("liveCount");

    function startTest() 
    {
      input.value = "";
      input.disabled = false;
      input.focus();
      ended = false;
      timeLeft = 60;
      timerDisplay.textContent = "Time: 60s";
      result.textContent = "";
      liveCount.textContent = "Words: 0";

      clearInterval(countdown);

      countdown = setInterval(() => {
        timeLeft = timeLeft - 1;
        timerDisplay.textContent = "Time: " + timeLeft + "s";

        if (timeLeft <= 0) {
          clearInterval(countdown);
          endTest();
        }
      }, 1000);
    }

    function stopTest() {
      clearInterval(countdown);
      endTest();
    }

    function endTest() {
      if (ended) return;
      ended = true;
      input.disabled = true;

      let text = input.value.trim();
      let words = 0;
      if (text !== "") {
        words = text.split(/\s+/).length;
      }
      
    }

    input.addEventListener("input", () => {
      let text = input.value.trim();
      let words = 0;
      if (text !== "") {
        words = text.split(/\s+/).length;
      }
      liveCount.textContent = "Words: " + words;
    });
  </script>
</body>
</html>
