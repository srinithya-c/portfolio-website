<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body
        {
          display: grid;
          margin: 0;
          grid-template-areas:
          "nav header header"
          "nav article ads"
          "footer footer footer";
          grid-template-rows: 80px 1fr 80px;
          grid-template-columns:1fr 15% 15%;
          height:100vh;
          grid-row-gap: 2px;
          grid-column-gap: 5px;
        }
      header,footer,article,nav,div
      {
        padding:1.2em;
        background-color: lightgray ;
        color:black
      }
      #header
        {
        grid-area: header;
        }
        #pagefooter
        {
        grid-area: footer;
        }
        #mainarticle
        {
        grid-area: article;
        }
        #mainnav
        {
         grid-area: nav;
        }
        #siteads
        {
        grid-area:ads;
        }
    </style>
</head>
<body>
    <header id="header">HEADER</header>
    <article id="mainarticle">ARTICLE</article>
    <nav id="mainnav">NAV</nav>
    <div id="siteads">DIV</div>
    <footer id="pagefooter">FOOTER</footer>
</body>
</html>
