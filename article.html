<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        body
        {
          background-color: chartreuse;
        }
        #pageheader

            text-align: center;

<body>
    <header id="pageheader">registration form</header>
    <div class="container">
        <div class="item">
        <form action="/submit.php" method="post">

        <label>date of birth:</label>
        <input type="date of birth" id="empty" placeholder="date"> <br> <br>
        <label>city</label> 
        <input type="text" id="empty" placeholder="enter your city"> <br> <br>
        <label>email</label>
        <input type="email" id="empty" placeholder="example@gamil.com"> <br> <br>
        <label>file</label>
        <input type="number" id="empty" placeholder="enter your number"> <br> <br>
        <label>search</label>
        <input type="search" id="empty" placeholder="search"> <br> <br>
        <label>password</label>
        <input type="password" id="empty" placeholder="......."> <br> <br>
        <button type="submit">submit</button>
    </div>
    </div>
    </form>
    <footer id="pagefooter">no copy rights</footer>
