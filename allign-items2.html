<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.align
{
   margin: 0; 
   align-items:flex-start;
   flex-direction: column;
   background-color: rgb(203, 174, 230);
   height: 100vh;
   

}
.align>div
{
 display: flex;
 flex: 1;
 padding: 1em;
 font-size: 2vw;
 width: 100vw;
}
.header
{
  color: aliceblue;
  background-color: blueviolet;
  flex-grow: 2;
  padding: 1em;
}
.mainarticle
{
  color: aliceblue;
  background-color: rgb(236, 62, 170);
  flex-grow: 3;
  padding: 1em;
}
.mainnav
{
  color: aliceblue;
  background-color: rgb(226, 153, 43);
  flex-grow: 1;
  padding: 1em;
}

.siteads
{
  color: aliceblue;
  background-color: rgb(43, 226, 89);
  flex-grow: 1;
  padding: 1em;
}
.pagefooter
{
  color: aliceblue;
  background-color: rgb(43, 226, 195);
  flex-grow: 1;
  padding: 1em;
}

    </style>
</head>
<body>
    <div class="align">
    <header class="header">HEADER</header>
    <article class="mainarticle">ARTICLE</article>
    <nav class="mainnav">NAV</nav>
    <div class="siteads">DIV</div>
    <footer class="pagefooter">FOOTER</footer>
    </div>
    </body>
</html>
